
<html>
<head>
    <title>Simple Image Gallery</title>
    <style>
        /* Basic Setup & Fonts */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        /* Filter Buttons */
        .filters {
            margin: 20px 0 40px 0;
        }

        .filter-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            margin: 0 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        /* Responsive Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .title {
            padding: 15px;
            font-weight: 600;
            text-align: left;
        }

        /* Simple Popup Modal (Lightbox) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 4px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Image Gallery</h1>
    
    <div class="filters">
        <button class="filter-btn active" onclick="filterGallery('all', this)">All</button>
        <button class="filter-btn" onclick="filterGallery('nature', this)">Nature</button>
        <button class="filter-btn" onclick="filterGallery('architecture', this)">Architecture</button>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item" data-category="nature" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80" alt="Valley">
            <div class="title">Mountain Valley</div>
        </div>

        <div class="gallery-item" data-category="architecture" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=600&q=80" alt="Skyscraper">
            <div class="title">Modern Skyscraper</div>
        </div>

        <div class="gallery-item" data-category="nature" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=600&q=80" alt="Foggy Forest">
            <div class="title">Foggy Forest</div>
        </div>

        <div class="gallery-item" data-category="architecture" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=600&q=80" alt="City Skyline">
            <div class="title">City Skyline</div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="close-btn">Close</button>
    <img id="lightbox-img" src="" alt="Popup View">
</div>

<script>
    // 1. Filter Logic
    function filterGallery(category, buttonElement) {
        // Update active button color styling
        document.querySelector('.filter-btn.active').classList.remove('active');
        buttonElement.classList.add('active');

        // Toggle card visibility visibility based on attributes
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => {
            if (category === 'all' || item.getAttribute('data-category') === category) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // 2. Open Lightbox 
    function openLightbox(itemElement) {
        const imgSrc = itemElement.querySelector('img').src;
        document.getElementById('lightbox-img').src = imgSrc;
        document.getElementById('lightbox').classList.add('active');
    }

    // 3. Close Lightbox
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
    }
</script>

</body>
</html>
